<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAYA | Coastal Apparel Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Beach Inspired Color Palette */
            --bg-primary: #fbf9f6;       /* Soft, warm sand/eggshell background */
            --bg-card: #ffffff;          /* Clean crisp linen white */
            --text-main: #1e293b;        /* Deep ocean navy/slate */
            --text-muted: #64748b;       /* Sea glass gray-blue */
            --accent-ocean: #2c7a7b;     /* Deep coastal teal */
            --accent-sand: #dfd3c3;      /* Muted driftwood tan */
            --accent-sunset: #e28743;    /* Warm coral/sunset orange */
            --border-color: #f1ebd9;     /* Soft sand tint border */
            --radius-lg: 20px;
            --radius-md: 14px;
            --shadow-subtle: 0 8px 30px rgba(223, 211, 195, 0.2);
            --shadow-hover: 0 15px 35px rgba(44, 122, 123, 0.08);
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            overflow-x: hidden;
            padding-bottom: 60px;
            position: relative; 
            min-height: 100vh;
        }

        /* Fixed Background Image with 60% Transparency (40% Opacity) */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.4; 
            z-index: -1; 
            pointer-events: none; 
        }

        /* Coastal Elegant Navbar */
        nav {
            position: sticky;
            top: 0;
            background: rgba(253, 249, 246, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-color);
            z-index: 100;
            padding: 24px 40px;
            display: flex;
            justify-content: center; 
            align-items: center;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            font-size: 1.8rem;
            letter-spacing: 2px;
            color: var(--text-main);
        }

        /* New White Container for Hero Banner */
        .hero-container {
            max-width: 800px;
            margin: 40px auto 10px auto;
            padding: 0 20px;
        }

        .hero-banner {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-subtle);
            text-align: center;
            padding: 40px 30px;
        }

        .hero-banner h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 400;
            font-style: italic;
            margin-bottom: 12px;
            color: var(--accent-ocean);
        }

        .hero-banner p {
            color: var(--text-muted);
            font-size: 1rem;
            letter-spacing: 0.5px;
        }

        /* Filter Tabs */
        .controls {
            max-width: 1200px;
            margin: 30px auto 20px auto;
            padding: 0 20px;
            display: flex;
            justify-content: center;
            gap: 16px;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid transparent;
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-muted);
            transition: var(--transition);
        }

        .filter-btn.active, .filter-btn:hover {
            border-color: var(--accent-sand);
            color: var(--text-main);
            background: var(--bg-card);
        }

        /* Catalog Layout Grid */
        .catalog-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Coastal Lifestyle Cards */
        .card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 20px;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-subtle);
            transition: var(--transition);
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-hover);
            border-color: var(--accent-sand);
        }

/* Warm Sand Image Frame */
.image-wrapper {
    width: 100%;
    height: 240px; 
    background-color: #f6f3ed;
    border-radius: var(--radius-md);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
    overflow: hidden;
}

/* Updated to make the image fill the entire container beautifully */
.image-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* Crops the image slightly to fill the space perfectly without distortion */
    filter: drop-shadow(0 10px 20px rgba(30,41,59,0.08));
    transition: var(--transition);
}
        .card:hover .image-wrapper img {
            transform: scale(1.1) rotate(2deg);
        }

        .card-category {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--accent-sunset);
            font-weight: 700;
            letter-spacing: 1.5px;
            margin-bottom: 6px;
        }

        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem;
            font-weight: 400;
            color: var(--text-main);
            margin-bottom: 16px;
            line-height: 1.3;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            width: 100%;
            padding-top: 14px;
            border-top: 1px solid var(--border-color);
        }

        .card-price {
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--text-main);
        }

        /* Direct WhatsApp Anchor Link Button */
        .buy-btn {
            display: inline-block;
            background: none;
            border: 1.5px solid var(--text-main);
            color: var(--text-main);
            padding: 8px 18px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: var(--transition);
        }

        .buy-btn:hover {
            background: var(--accent-ocean);
            border-color: var(--accent-ocean);
            color: #ffffff;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">RAYA</div>
    </nav>

    <div class="hero-container">
        <div class="hero-banner">
            <h2>Designed for the Sun</h2>
            <p>Premium modern linen and essentials built for slow coastal days.</p>
        </div>
    </div>

    <div class="controls">
        <button class="filter-btn active" onclick="filterCatalog('all', this)">All Items</button>
        <button class="filter-btn" onclick="filterCatalog('resort', this)">Resortwear</button>
        <button class="filter-btn" onclick="filterCatalog('swim-surf', this)">Swim & Surf</button>
    </div>

    <main class="catalog-container" id="catalog"></main>

    <script>
        // Business configurations
        const WHATSAPP_PHONE = "527752388741"; 

        const products = [
            { id: 1, name: "Malibu Linen Tee", price: 44.00, image: "/camisa1.jpg", category: "resort" },
            { id: 2, name: "Outrigger Button-Up", price: 78.00, image: "/camisa2.jpg", category: "resort" },
            { id: 3, name: "Tidal Knit Polo", price: 65.00, image: "/camisa2.jpg", category: "resort" },
            { id: 4, name: "Driftwood Sun V-Neck", price: 38.00, image: "/camisa2.jpg", category: "resort" },
            { id: 5, name: "Offshore Heavy Hoodie", price: 92.00, image: "/camisa2.jpg", category: "swim-surf" },
            { id: 6, name: "Coral Sun Crewneck", price: 84.00, image: "/camisa3.jpg", category: "swim-surf" } ,
            { id: 7, name: "Camisa Amarilla SM", price: 150.00, image: "/camisa4.jpg", category: "ropa-trabajo" }
        ];

        const catalogContainer = document.getElementById('catalog');

        function generateWhatsAppUrl(productName, productPrice) {
            const baseMessage = `Hello RAYA! I am interested in ordering the ${productName} ($${productPrice.toFixed(2)}). Is this item available?`;
            const encodedText = encodeURIComponent(baseMessage);
            return `https://wa.me/${WHATSAPP_PHONE}?text=${encodedText}`;
        }

        function renderCatalog(itemsToRender = products) {
            catalogContainer.innerHTML = itemsToRender.map(product => {
                const waHref = generateWhatsAppUrl(product.name, product.price);
                
                return `
                    <div class="card">
                        <div class="image-wrapper">
                            <img src="${product.image}" alt="${product.name}">
                        </div>
                        <div class="card-category">${product.category}</div>
                        <h2 class="card-title">${product.name}</h2>
                        <div class="card-footer">
                            <span class="card-price">$${product.price.toFixed(2)}</span>
                            <a class="buy-btn" href="${waHref}" target="_blank" rel="noopener noreferrer">Order Now</a>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterCatalog(category, buttonEl) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            buttonEl.classList.add('active');
            
            if (category === 'all') {
                renderCatalog(products);
            } else {
                const filtered = products.filter(p => p.category === category);
                renderCatalog(filtered);
            }
        }

        renderCatalog();
    </script>
</body>
</html>
